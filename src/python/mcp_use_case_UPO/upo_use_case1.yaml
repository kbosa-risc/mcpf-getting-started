input_path: &base_dir 'c:\Projects\risc_dse\configurable_pipeline_frm\src\python\mcp_use_case_UPO\data'
output_path: *base_dir
entry_point: 'EQE_p'
further_configuration: ~
imports:
  - mcp_general_functions.mcp_general_transformations
  - mcp_general_functions.mcp_general_io
  - mcp_use_case_UPO.EQE_computations
pipelines:
  - EQE_p:
    - read_help_tables_p: ~
    - list_dir:
      - {input_path: 'EQE\data\dut',
         output: 'file_list_dut',
         relative_path: True,
         output_for_iteration: True}
    - loop: read_dut_files_p
    - list_dir:
      - {input_path: 'EQE\data\calibration_fotodiode',
         output: 'file_list_fotodiode',
         relative_path: True,
         output_for_iteration: True}
    - loop: read_fotodiode_files_p
    - initialization_p: ~
    - loop_calculation: calculation_core_p

  - read_help_tables_p:
    - read_csv:
        - { file_name: 'Hamamatsu_PhotoDiode_Spectral_Response.csv',
            input_path: 'help_table',
            separator: ';',
            relative_path: True }
    - interpolate_first_column:
        - { output: 'help_df_hamamatsu', step: 5 }
    - read_csv:
        - { file_name: 'Reference_Spectra_Derived.csv',
            input_path: 'help_table',
            separator: ';',
            relative_path: True,
            output: 'help_df_referance' }

  - read_dut_files_p:
    - read_csv:
      - {input_path: 'EQE\data\dut', separator: ';', relative_path: True}
    - vertical_concatenation:
      - {left_value: 'df_dut'}

  - read_fotodiode_files_p:
    - read_csv:
      - { input_path: 'EQE\data\calibration_fotodiode', separator: ';', relative_path: True }
    - vertical_concatenation:
      - { left_value: 'df_fotodiode' }

  - initialization_p:
     - init_calc_eqe_perc: ~
     - init_calc_integral_current_density: ~

  - calculation_core_p:
     - calculate_integral_current_density: ~
     - calculate_eqe_perc: ~
     - feedback_on_std_out: ~
#

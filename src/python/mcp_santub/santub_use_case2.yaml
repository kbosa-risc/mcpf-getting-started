output_path: 'c:\Projects\risc_dse\data_santub\parquet_files_for_classifiers'
further_configuration:
  - default_value_note: 0
  - header:
      ['Jahr', 'Objekt Name', 'Baujahr', 'Pos.', 'Bauteil', 'Lokation', 'Schaeden', 'Anzahl Lokat.', 'Laenge (m)', 'Breite (m)', 'Material', 'zustand_note', 'Anmerkung', 'bauteil_zustand_note', 'Y', 'X', 'Gesamtnote']
pipeline_extension:
  - read_dirs_p:
      - list_dir:
        - { output_for_iteration: True }
      - loop: process_excel_p

  - process_excel_p:
      - get_object_name: ~
      - read_excel_worksheets: ~
      - process_worksheet_data: ~
      - creating_list_of_build_parts: ~
      - loop: group_output_p

  - group_output_p:
      - selecting_data_of_build_parts: ~
      - write_parquet:
          - { input: 'current_build_part_data', relative_path: True, output: 'current_build_part_data', 'preserve_index': False }

